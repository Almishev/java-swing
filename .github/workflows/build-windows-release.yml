# Комплект WorkTimeBG-*.exe (jpackage под Windows).
#
# Push с GITHUB_TOKEN (както при Bump bot) по подразбиране НЕ пускат други workflows.
# Затова вторият тригер е workflow_run след "Bump project version".
# При ръчен push само към pom.xml (локално, не-bot) продължава да важи paths: pom.xml.
#
# Settings → Actions → General: Workflow permissions = read and write за push на release/tag.
name: Build Windows exe and GitHub Release

on:
  workflow_run:
    workflows: ["Bump project version"]
    types: [completed]
    branches: [main, master]
  push:
    branches: [main, master]
    paths:
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-exe:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event.workflow_run.conclusion == 'success')
    runs-on: windows-latest

    steps:
      - name: Checkout (sync tip after bump bot push)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Point to latest default branch tip (след pom push от bot)
        if: github.event_name == 'workflow_run'
        shell: bash
        env:
          SYNC_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          branch="${SYNC_BRANCH:-main}"
          git fetch origin "$branch"
          git checkout "$branch"
          git reset --hard "origin/$branch"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - name: Install WiX Toolset (required for jpackage --type exe on Windows)
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress

      - name: Package shaded JAR
        run: mvn -ntp -B package -DskipTests

      - name: Read versions
        id: ver
        shell: pwsh
        run: |
          $pomRaw = (& mvn -ntp -q -DforceStdout help:evaluate "-Dexpression=project.version").Trim()
          $appVer = $pomRaw -replace '-SNAPSHOT$',''
          "pom_ver=$pomRaw" >> $env:GITHUB_OUTPUT
          "app_ver=$appVer" >> $env:GITHUB_OUTPUT

      - name: jpackage installer
        env:
          POM_VER: ${{ steps.ver.outputs.pom_ver }}
          APP_VER: ${{ steps.ver.outputs.app_ver }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path jpkg-input, dist -Force | Out-Null
          Copy-Item "target/swing-system-$env:POM_VER.jar" -Destination jpkg-input/
          & jpackage `
            --type exe `
            --input jpkg-input `
            --name WorkTimeBG `
            --main-jar "swing-system-$env:POM_VER.jar" `
            --main-class bg.restaurant.swing.Main `
            --app-version $env:APP_VER `
            --vendor "Restaurant" `
            --dest dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.app_ver }}
          name: WorkTimeBG v${{ steps.ver.outputs.app_ver }}
          generate_release_notes: true
          make_latest: true
          files: dist/WorkTimeBG*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

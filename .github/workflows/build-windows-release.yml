# Създава WorkTimeBG-*.exe (jpackage на Windows), след като версията в pom се обнови.
# Комитът само с pom от job "Bump project version" променя paths pom.xml → този workflow се пуска
# при нов snapshot номер след промяни в Java кода на main/master.
#
# Permissions: Repo → Settings → Actions → General → Workflow permissions = read/write.
name: Build Windows exe and GitHub Release

on:
  push:
    branches: [main, master]
    paths:
      - 'pom.xml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-exe:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.9

      - name: Install WiX Toolset (required for jpackage --type exe on Windows)
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress

      - name: Package shaded JAR
        run: mvn -ntp -B package -DskipTests

      - name: Read versions
        id: ver
        shell: pwsh
        run: |
          $pomRaw = (& mvn -ntp -q -DforceStdout help:evaluate "-Dexpression=project.version").Trim()
          $appVer = $pomRaw -replace '-SNAPSHOT$',''
          "pom_ver=$pomRaw" >> $env:GITHUB_OUTPUT
          "app_ver=$appVer" >> $env:GITHUB_OUTPUT

      - name: jpackage installer
        env:
          POM_VER: ${{ steps.ver.outputs.pom_ver }}
          APP_VER: ${{ steps.ver.outputs.app_ver }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path jpkg-input, dist -Force | Out-Null
          Copy-Item "target/swing-system-$env:POM_VER.jar" -Destination jpkg-input/
          & jpackage `
            --type exe `
            --input jpkg-input `
            --name WorkTimeBG `
            --main-jar "swing-system-$env:POM_VER.jar" `
            --main-class bg.restaurant.swing.Main `
            --app-version $env:APP_VER `
            --vendor "Restaurant" `
            --dest dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.app_ver }}
          name: WorkTimeBG v${{ steps.ver.outputs.app_ver }}
          generate_release_notes: true
          make_latest: true
          files: dist/WorkTimeBG*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
